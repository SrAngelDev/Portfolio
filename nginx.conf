server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Security headers
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Hashed assets: 1 year, immutable
    location ~* ^/_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static media assets (also fingerprinted by Astro when imported)
    location ~* \.(?:woff2?|ttf|otf|eot|jpe?g|png|gif|webp|avif|svg|ico|mp4|webm)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # HTML: never cache long — content can change with each deploy
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Astro generates per-route .html files. Try them in order, otherwise 404.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
