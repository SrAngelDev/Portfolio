# =====================================================================
# Snippet de docker-compose para el servidor de casa.
#
# - cloudflared:  túnel Cloudflare que publica srangeldev.es
# - portfolio:    contenedor con la web Astro (imagen pública GHCR)
# - watchtower:   actualiza automáticamente la imagen del portfolio
#
# Pégalo dentro de tu docker-compose.yml existente (en `services:`)
# y ajusta el nombre de la imagen y el TUNNEL_TOKEN.
# =====================================================================

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - web

  portfolio:
    # Reemplaza <owner>/<repo> por tu usuario/repo en minúsculas.
    # Ej: ghcr.io/srangeldev/portfolioastro:latest
    image: ghcr.io/<owner>/<repo>:latest
    container_name: portfolio
    restart: unless-stopped
    # No exponemos puertos al host: cloudflared se conecta por red interna.
    expose:
      - "80"
    networks:
      - web
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Comprueba cada 5 min y sólo actualiza contenedores con label enable=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    networks:
      - web

networks:
  web:
    driver: bridge
